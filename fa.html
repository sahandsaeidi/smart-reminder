<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یادآور هوشمند سهند</title>
    
    <!-- ====== Manifest ====== -->
    <link rel="manifest" href="site.webmanifest">
    
    <!-- ====== Favicon ====== -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <!-- ====== رنگ‌های PWA (هر دو نسخه) ====== -->
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* استایل‌های قبلی (همون چک‌لیست) رو اینجا می‌ذاریم */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        header h1 {
            color: #4a3f5c;
            font-size: 2.2rem;
        }
        header p {
            color: #7c6b9e;
            font-size: 1rem;
        }
        .add-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .add-section h2 {
            color: white;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input,
        .input-group select {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        .input-group button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #4a3f5c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .reminder-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f6ff;
            padding: 15px 18px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }
        .reminder-item:hover {
            background: #f0ebf7;
        }
        .reminder-info {
            flex: 1;
        }
        .reminder-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #4a3f5c;
        }
        .reminder-time {
            font-size: 0.9rem;
            color: #7c6b9e;
        }
        .reminder-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #42e695;
            color: white;
        }
        .reminder-status.pending {
            background: #f5576c;
        }
        .btn-delete {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #f5576c;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-delete:hover {
            background: #ffe8ec;
        }
        .empty-message {
            text-align: center;
            color: #a99bbc;
            padding: 40px 20px;
        }
        .install-btn {
            background: #42e695;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        .install-btn:hover {
            transform: scale(1.02);
        }
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .input-group {
                flex-direction: column;
            }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4a3f5c;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
            font-weight: bold;
        }
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        .lang-switch {
            margin-top: 10px;
            display: inline-block;
            background: #4a3f5c;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .lang-switch:hover {
            background: #5f4f7a;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
                        
            <h1>⏰ یادآور هوشمند</h1>
            <p>با نوتیفیکیشن + سرویس‌ورکر + قابلیت نصب</p>
            <a href="index.html" class="lang-switch">En</a>لاتالتلاتاتاتال
            <button class="install-btn" id="installBtn">📲 نصب برنامه روی دستگاه</button>
        </header>

        <!-- بخش افزودن یادآوری -->
        <div class="add-section">
            <h2>➕ یادآوری جدید</h2>
            <div class="input-group">
                <input type="text" id="reminderTitle" placeholder="عنوان (مثلاً: جلسه کاری)">
                <input type="datetime-local" id="reminderTime">
                <button id="addReminderBtn">➕ افزودن</button>
            </div>
        </div>

        <!-- لیست یادآوری‌ها -->
        <h3>📋 یادآوری‌های فعال</h3>
        <div class="reminder-list" id="reminderList">
            <!-- با JS پر می‌شه -->
        </div>
    </div>

    <!-- Toast پیام -->
    <div class="toast" id="toast"></div>

    <script>
        // ======================================================
        // داده‌ها و متغیرها
        // ======================================================
        let reminders = [];
        let notificationPermission = false;
        let checkInterval = null;

        // ======================================================
        // بارگذاری از localStorage
        // ======================================================
        function loadData() {
            const saved = localStorage.getItem('remindersData');
            if (saved) {
                try {
                    reminders = JSON.parse(saved);
                    // تبدیل زمان‌های ذخیره شده به Date
                    reminders = reminders.map(r => ({
                        ...r,
                        time: new Date(r.time)
                    }));
                } catch (e) {
                    reminders = [];
                }
            } else {
                // داده‌های پیش‌فرض
                const now = new Date();
                now.setMinutes(now.getMinutes() + 2); // ۲ دقیقه بعد
                reminders = [{
                    id: Date.now(),
                    title: 'یادآوری تست',
                    time: now,
                    notified: false
                }];
            }
            saveData();
            renderReminders();
        }

        function saveData() {
            localStorage.setItem('remindersData', JSON.stringify(reminders));
        }

        // ======================================================
        // نمایش Toast
        // ======================================================
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ======================================================
        // درخواست مجوز نوتیفیکیشن
        // ======================================================
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                showToast('مرورگر شما از نوتیفیکیشن پشتیبانی نمی‌کند!');
                return false;
            }

            if (Notification.permission === 'granted') {
                notificationPermission = true;
                return true;
            }

            if (Notification.permission === 'denied') {
                showToast('⚠️ شما دسترسی نوتیفیکیشن را رد کرده‌اید. لطفاً از تنظیمات مرورگر اجازه دهید.');
                return false;
            }

            // درخواست مجوز
            const permission = await Notification.requestPermission();
            notificationPermission = permission === 'granted';
            if (notificationPermission) {
                showToast('✅ مجوز نوتیفیکیشن داده شد!');
            } else {
                showToast('❌ مجوز نوتیفیکیشن رد شد!');
            }
            return notificationPermission;
        }

        // ======================================================
        // ارسال نوتیفیکیشن
        // ======================================================
        function sendNotification(title, body) {
            if (!notificationPermission) {
                console.log('مجوز نوتیفیکیشن وجود ندارد');
                return;
            }

            try {
                const options = {
                    body: body,
                    icon: 'icon.png',
                    badge: 'icon.png',
                    vibrate: [200, 100, 200],
                    requireInteraction: true,
                    tag: Date.now().toString(),
                    actions: [
                        { action: 'open', title: '📂 باز کردن' }
                    ]
                };

                const notification = new Notification(title, options);

                notification.onclick = function() {
                    window.focus();
                    this.close();
                };

                // پخش صدا
                playNotificationSound();

            } catch (e) {
                console.error('خطا در ارسال نوتیفیکیشن:', e);
            }
        }

        // ======================================================
        // پخش صدا
        // ======================================================
        function playNotificationSound() {
            try {
                const audioContext = new(window.AudioContext || window.webkitAudioContext)();
                const notes = [880, 1100, 1320];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                        osc.start(audioContext.currentTime);
                        osc.stop(audioContext.currentTime + 0.2);
                    }, i * 150);
                });
            } catch (e) {
                console.log('صدا:', e);
            }
        }

        // ======================================================
        // چک کردن یادآوری‌ها (هر ۳۰ ثانیه)
        // ======================================================
        function checkReminders() {
            const now = new Date();
            let anyNotified = false;

            reminders.forEach(reminder => {
                if (!reminder.notified && reminder.time <= now) {
                    // ارسال نوتیفیکیشن
                    const timeStr = reminder.time.toLocaleTimeString('fa-IR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    sendNotification(
                        `⏰ ${reminder.title}`,
                        `زمان: ${timeStr} - وقتش رسیده!`
                    );
                    reminder.notified = true;
                    anyNotified = true;
                    showToast(`🔔 یادآوری "${reminder.title}" فعال شد!`);
                }
            });

            if (anyNotified) {
                saveData();
                renderReminders();
            }
        }

        // ======================================================
        // رندر لیست یادآوری‌ها
        // ======================================================
        function renderReminders() {
            const list = document.getElementById('reminderList');

            // مرتب‌سازی بر اساس زمان
            const sorted = [...reminders].sort((a, b) => a.time - b.time);

            if (sorted.length === 0) {
                list.innerHTML = `
                    <div class="empty-message">
                        <p>📭 هیچ یادآوری فعالی وجود ندارد</p>
                        <p style="font-size:0.9rem;">یک یادآوری جدید اضافه کن!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = sorted.map(reminder => {
                const timeStr = reminder.time.toLocaleString('fa-IR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const isPending = !reminder.notified && reminder.time > new Date();
                const statusText = reminder.notified ? '✅ انجام شده' :
                    (reminder.time <= new Date() ? '⚠️ زمان گذشته' : '⏳ در انتظار');

                return `
                    <div class="reminder-item">
                        <div class="reminder-info">
                            <div class="reminder-title">${escapeHtml(reminder.title)}</div>
                            <div class="reminder-time">📅 ${timeStr}</div>
                        </div>
                        <span class="reminder-status ${isPending ? 'pending' : ''}">${statusText}</span>
                        <button class="btn-delete" onclick="deleteReminder(${reminder.id})">🗑️</button>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ======================================================
        // مدیریت یادآوری‌ها
        // ======================================================
        function addReminder() {
            const titleInput = document.getElementById('reminderTitle');
            const timeInput = document.getElementById('reminderTime');

            const title = titleInput.value.trim();
            const timeValue = timeInput.value;

            if (!title) {
                showToast('⚠️ لطفاً عنوان یادآوری را وارد کن!');
                return;
            }
            if (!timeValue) {
                showToast('⚠️ لطفاً زمان یادآوری را مشخص کن!');
                return;
            }

            const time = new Date(timeValue);
            if (time <= new Date()) {
                showToast('⚠️ زمان باید در آینده باشد!');
                return;
            }

            const newReminder = {
                id: Date.now() + Math.random(),
                title: title,
                time: time,
                notified: false
            };

            reminders.push(newReminder);
            saveData();
            renderReminders();
            titleInput.value = '';
            timeInput.value = '';

            showToast(`✅ یادآوری "${title}" با موفقیت اضافه شد!`);
        }

        function deleteReminder(id) {
            if (!confirm('آیا از حذف این یادآوری مطمئنی؟')) return;
            reminders = reminders.filter(r => r.id !== id);
            saveData();
            renderReminders();
            showToast('🗑️ یادآوری حذف شد!');
        }

        // ======================================================
        // Service Worker + Manifest
        // ======================================================

        // ثبت Service Worker
        async function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) {
                console.log('سرویس‌ورکر پشتیبانی نمی‌شود');
                return;
            }

            try {
                const registration = await navigator.serviceWorker.register('sw.js', {
                    scope: '/'
                });
                console.log('✅ سرویس‌ورکر ثبت شد:', registration);

                // چک کردن نوتیفیکیشن‌ها از طریق سرویس‌ورکر
                if (registration.pushManager) {
                    console.log('✅ Push Manager پشتیبانی می‌شود');
                }

                showToast('✅ سرویس‌ورکر فعال شد!');

            } catch (error) {
                console.error('❌ خطا در ثبت سرویس‌ورکر:', error);
                showToast('⚠️ سرویس‌ورکر ثبت نشد!');
            }
        }

        // ======================================================
        // نصب PWA
        // ======================================================
        let deferredPrompt = null;

        function setupInstallButton() {
            const installBtn = document.getElementById('installBtn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'block';
                console.log('📲 قابلیت نصب PWA فعال شد');
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const result = await deferredPrompt.userChoice;
                    if (result.outcome === 'accepted') {
                        showToast('✅ برنامه نصب شد!');
                        installBtn.style.display = 'none';
                    } else {
                        showToast('❌ نصب لغو شد');
                    }
                    deferredPrompt = null;
                }
            });

            window.addEventListener('appinstalled', () => {
                showToast('🎉 برنامه با موفقیت نصب شد!');
                installBtn.style.display = 'none';
            });
        }

        // ======================================================
        // مقداردهی اولیه
        // ======================================================
        async function init() {
            // بارگذاری داده‌ها
            loadData();

            // درخواست مجوز نوتیفیکیشن
            await requestNotificationPermission();

            // ثبت سرویس‌ورکر
            await registerServiceWorker();

            // تنظیم دکمه نصب
            setupInstallButton();

            // تنظیم چک‌کننده (هر ۳۰ ثانیه)
            checkInterval = setInterval(checkReminders, 30000);

            // چک اولیه
            setTimeout(checkReminders, 1000);

            // رویدادها
            document.getElementById('addReminderBtn').addEventListener('click', addReminder);

            // Enter در فیلدها
            document.getElementById('reminderTitle').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addReminder();
            });
            document.getElementById('reminderTime').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addReminder();
            });

            showToast('⏰ برنامه یادآوری آماده است!');
        }

        // شروع
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
